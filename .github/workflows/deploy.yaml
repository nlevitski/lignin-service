name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      APP_DIR: ${{ secrets.APP_DIR }}
    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Prepare VPS
        run: |
          set -euo pipefail
          APP_DIR="${APP_DIR:-/home/ubuntu/lignin/lignin-service}"
          ssh "$VPS_USER@$VPS_HOST" \
            "mkdir -p '$APP_DIR' && (docker network inspect lignin >/dev/null 2>&1 || docker network create lignin)"

      - name: Deploy
        run: |
          set -euo pipefail
          APP_DIR="${APP_DIR:-/home/ubuntu/lignin/lignin-service}"
          ssh "$VPS_USER@$VPS_HOST" \
            "if [ ! -d '$APP_DIR/.git' ]; then \
              git clone git@github.com:nlevitski/lignin-service.git '$APP_DIR'; \
            fi; \
            cd '$APP_DIR' && \
            git fetch --prune && \
            git checkout main && \
            git pull --ff-only && \
            docker compose --profile prod up -d --build"
